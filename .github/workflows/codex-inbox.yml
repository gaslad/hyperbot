name: "Codex: Check Inbox"

on:
  schedule:
    - cron: "0 9 * * *"   # daily at 9am UTC
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  check-inbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for pending tasks
        id: check
        run: |
          if grep -q '^\- \[ \]' .tasks/codex.md; then
            echo "has_tasks=true" >> "$GITHUB_OUTPUT"
            echo "Found pending tasks in codex inbox"
          else
            echo "has_tasks=false" >> "$GITHUB_OUTPUT"
            echo "No pending tasks — skipping"
          fi

      - name: Run Codex on pending tasks
        if: steps.check.outputs.has_tasks == 'true'
        uses: openai/codex-action@v1
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Read .tasks/PROTOCOL.md for the task protocol.
            Read .tasks/codex.md for your pending tasks.
            Read AGENTS.md for repo context.

            For each unchecked task (- [ ]):
            1. Read the referenced files for context
            2. Implement the task as described
            3. Mark the task [x] in .tasks/codex.md
            4. Fill in the Result: line with a one-line summary
            5. Append a row to .tasks/_log.md

            If your work creates follow-up tasks for another assistant,
            append them to .tasks/claude.md or .tasks/gemini.md.

            Commit your changes with a descriptive message.
